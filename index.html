<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Data OS</title>
<style>
html,body{margin:0;padding:0;height:100%;background:#000;color:#0f0;font-family:monospace;overflow:hidden;}
iframe{position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;border:none!important;z-index:3;}
#editor-ta{position:fixed;inset:0;width:100vw;height:100vh;border:none;background:#111;color:#0f0;padding:20px;box-sizing:border-box;font-family:monospace;font-size:14px;z-index:3;}
.inspect-panel textarea{padding:4px 6px !important;}
.toolbar{position:fixed;top:10px;right:10px;z-index:10;}
button{padding:8px 14px;margin-left:5px;font-size:14px;cursor:pointer;background:rgba(0,0,0,0.2);color:#0f0;border:1px solid rgba(0,255,0,0.3);font-family:monospace;}
button:hover{background:rgba(0,255,0,0.15);border-color:#0f0;}
.menu-page{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:transparent;z-index:5;}
.menu-page h1{color:#0f0;margin-bottom:30px;font-size:28px;}
.menu-page .menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:500px;}
.menu-page button{background:#000;color:#0f0;border:2px solid #0f0;padding:12px 30px;margin:0;font-size:16px;font-family:monospace;cursor:pointer;width:100%;}
.menu-page button:hover{background:#0f0;color:#000;}
.stress-page{position:fixed;inset:0;display:flex;flex-direction:column;background:#000;z-index:5;font-family:monospace;overflow:hidden;}
.stress-header{padding:14px 20px 10px;border-bottom:1px solid rgba(0,255,0,0.2);display:flex;align-items:center;justify-content:space-between;}
.stress-title{color:#0f0;font-size:18px;letter-spacing:4px;}
.stress-badge{font-size:11px;color:#0a0;letter-spacing:2px;padding:3px 10px;border:1px solid rgba(0,255,0,0.3);}
.stress-body{flex:1;display:flex;gap:0;overflow:hidden;}
.stress-left{flex:1;display:flex;flex-direction:column;padding:14px 16px;gap:10px;border-right:1px solid rgba(0,255,0,0.15);}
.stress-right{width:260px;display:flex;flex-direction:column;padding:14px 16px;gap:12px;}
.stress-section-label{color:#0a0;font-size:10px;letter-spacing:3px;margin-bottom:4px;}
.stress-graph-wrap{flex:1;position:relative;border:1px solid rgba(0,255,0,0.2);background:#050505;min-height:0;}
#stressGraph{width:100%;height:100%;display:block;}
.stress-cores{display:flex;flex-direction:column;gap:5px;}
.stress-core-row{display:flex;align-items:center;gap:8px;}
.stress-core-label{color:#0a0;font-size:10px;min-width:44px;letter-spacing:1px;}
.stress-core-bar-wrap{flex:1;height:14px;background:#0a0a0a;border:1px solid rgba(0,255,0,0.15);position:relative;overflow:hidden;}
.stress-core-bar{height:100%;width:0%;background:linear-gradient(90deg,#0a0,#0f0);transition:width 0.3s;box-shadow:0 0 6px rgba(0,255,0,0.4);}
.stress-core-pct{color:#0f0;font-size:10px;min-width:32px;text-align:right;}
.stress-stat-box{border:1px solid rgba(0,255,0,0.2);background:#050505;padding:10px 12px;}
.stress-stat-title{color:#0a0;font-size:9px;letter-spacing:3px;margin-bottom:6px;}
.stress-stat-value{color:#0f0;font-size:22px;letter-spacing:2px;}
.stress-stat-unit{color:#0a0;font-size:10px;margin-left:4px;}
.stress-stat-sub{color:#0a0;font-size:10px;margin-top:3px;}
.stress-controls{display:flex;gap:8px;padding:10px 16px;border-top:1px solid rgba(0,255,0,0.15);}
.stress-btn{flex:1;padding:9px 0;font-family:monospace;font-size:13px;letter-spacing:2px;cursor:pointer;border:1px solid rgba(0,255,0,0.4);background:#000;color:#0f0;}
.stress-btn:hover{background:rgba(0,255,0,0.1);border-color:#0f0;}
.stress-btn.active{background:rgba(0,255,0,0.15);border-color:#0f0;color:#0f0;box-shadow:0 0 8px rgba(0,255,0,0.2);}
.stress-btn.stop{border-color:rgba(255,80,80,0.4);color:#f55;}
.stress-btn.stop:hover{background:rgba(255,80,80,0.1);border-color:#f55;}
.stress-status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;background:#333;}
.stress-status-dot.running{background:#0f0;box-shadow:0 0 6px #0f0;animation:stress-pulse 1s infinite;}
@keyframes stress-pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.topbar{position:fixed;top:-70px;left:50%;transform:translateX(-50%);background:#111;padding:8px 12px;display:flex;gap:6px;transition:top 0.3s ease;z-index:999;align-items:center;}
.topbar.visible{top:5px;}
.topbar input{width:320px;padding:6px;background:#222;color:#0f0;border:1px solid #0f0;font-family:monospace;}
.hover-zone{position:fixed;top:0;left:0;width:100%;height:25px;z-index:998;}
.url-page{position:fixed;inset:0;display:flex;flex-direction:column;background:#000;z-index:5;}
.url-page-header{padding:20px 30px 0;display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;}
.url-page-header input{flex:1;min-width:200px;padding:8px;background:#111;color:#0f0;border:1px solid #0f0;font-family:monospace;font-size:14px;}
.b64-wrap{position:fixed;inset:0;z-index:3;}
.b64-ta{position:absolute;inset:0;width:100%;height:100%;border:none;background:#111;color:#0f0;padding:20px;box-sizing:border-box;font-family:monospace;font-size:14px;resize:none;}
.b64-ta.drag-over{background:#0b1a0b;box-shadow:inset 0 0 0 3px #0f0;}
.copyright{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);color:rgba(0,255,0,0.45);font-size:11px;z-index:9999;pointer-events:none;white-space:nowrap;letter-spacing:1px;user-select:none;-webkit-user-select:none;}

/* Startup screen */
.startup-page{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:transparent;z-index:100;gap:40px;}
.startup-title{color:#0f0;font-family:monospace;font-size:48px;letter-spacing:8px;}
.startup-subtitle{color:#0a0;font-family:monospace;font-size:13px;letter-spacing:4px;}
.startup-buttons{display:flex;gap:20px;}
.startup-btn{background:#000;color:#0f0;border:2px solid #0f0;padding:16px 48px;font-family:monospace;font-size:18px;cursor:pointer;letter-spacing:3px;}
.startup-btn:hover{background:#0f0;color:#000;}

/* URL Loader quick-links dropdown */
.ql-wrap{position:relative;display:inline-block;}
.ql-btn{padding:8px 14px;font-size:14px;cursor:pointer;background:rgba(0,0,0,0.2);color:#0f0;border:1px solid rgba(0,255,0,0.3);font-family:monospace;margin-left:0;}
.ql-btn:hover{background:rgba(0,255,0,0.15);border-color:#0f0;}
.ql-dropdown{display:none;position:absolute;top:100%;left:50%;transform:translateX(-50%);background:#0a0a0a;border:1px solid #0f0;min-width:260px;z-index:200;box-shadow:0 4px 20px rgba(0,255,0,0.2);margin-top:4px;}
.ql-dropdown.open{display:block;}
.ql-item{display:block;width:100%;padding:10px 16px;background:transparent;color:#0f0;border:none;border-bottom:1px solid rgba(0,255,0,0.1);font-family:monospace;font-size:13px;cursor:pointer;text-align:left;box-sizing:border-box;margin:0;}
.ql-item:last-child{border-bottom:none;}
.ql-item:hover{background:rgba(0,255,0,0.12);color:#fff;}
.ql-header{padding:6px 16px;color:#0a0;font-size:11px;letter-spacing:2px;border-bottom:1px solid rgba(0,255,0,0.2);}

/* Draw canvas */
.draw-page{position:fixed;inset:0;background:#000;z-index:5;display:flex;flex-direction:column;}
.draw-toolbar{display:flex;gap:6px;padding:8px;background:#111;border-bottom:1px solid #0f0;flex-wrap:wrap;align-items:center;}
.draw-toolbar input[type=color]{width:36px;height:30px;padding:0;border:1px solid #0f0;background:#000;cursor:pointer;}
.draw-toolbar input[type=range]{width:80px;accent-color:#0f0;}
.draw-toolbar select{background:#000;color:#0f0;border:1px solid #0f0;font-family:monospace;padding:4px;}
.draw-toolbar label{color:#0f0;font-size:12px;}
#drawCanvas{flex:1;cursor:crosshair;display:block;}

/* Pixel art editor */
.pixel-page{position:fixed;inset:0;background:#000;z-index:5;display:flex;flex-direction:column;}
.pixel-toolbar{display:flex;gap:6px;padding:8px;background:#111;border-bottom:1px solid #0f0;flex-wrap:wrap;align-items:center;}
.pixel-toolbar input[type=color]{width:36px;height:30px;padding:0;border:1px solid #0f0;background:#000;cursor:pointer;}
.pixel-toolbar label{color:#0f0;font-size:12px;}
.pixel-toolbar select{background:#000;color:#0f0;border:1px solid #0f0;font-family:monospace;padding:4px;}
.pixel-canvas-wrap{flex:1;display:flex;justify-content:center;align-items:center;overflow:hidden;}
#pixelGrid{display:grid;border:1px solid #0f0;cursor:crosshair;}
.px-cell{width:16px;height:16px;box-sizing:border-box;border:1px solid #0a0a0a;}

/* ASCII art */
.ascii-page{position:fixed;inset:0;background:#000;z-index:5;display:flex;flex-direction:column;}
.ascii-toolbar{display:flex;gap:6px;padding:8px;background:#111;border-bottom:1px solid #0f0;flex-wrap:wrap;align-items:center;}
.ascii-toolbar label{color:#0f0;font-size:12px;}
.ascii-toolbar select{background:#000;color:#0f0;border:1px solid #0f0;font-family:monospace;padding:4px;}
.ascii-toolbar input[type=range]{width:80px;accent-color:#0f0;}
.ascii-split{flex:1;display:flex;overflow:hidden;}
.ascii-input-wrap{flex:1;display:flex;flex-direction:column;border-right:1px solid #0f0;}
.ascii-input-wrap textarea{flex:1;background:#111;color:#0f0;border:none;padding:10px;font-family:monospace;font-size:13px;resize:none;outline:none;}
.ascii-output{flex:1;overflow:auto;padding:10px;font-size:10px;line-height:1.1;white-space:pre;color:#0f0;font-family:monospace;}
.ascii-drop-hint{color:#0f0;opacity:0.5;text-align:center;padding:20px;font-size:12px;}

/* Hacker typer */
.hacker-page{position:fixed;inset:0;background:#000;z-index:5;display:flex;flex-direction:column;}
.hacker-display{flex:1;padding:20px;font-family:monospace;font-size:14px;color:#0f0;white-space:pre-wrap;word-break:break-all;overflow:auto;line-height:1.5;}
.hacker-status{padding:6px 12px;background:#111;border-top:1px solid #0f0;font-size:12px;color:#0a0;display:flex;gap:20px;}

/* Terminal */
.term-page{position:fixed;inset:0;background:#0a0a0a;z-index:5;display:flex;flex-direction:column;}
.term-output{flex:1;padding:14px;font-family:monospace;font-size:14px;color:#0f0;white-space:pre-wrap;overflow-y:auto;line-height:1.6;}
.term-input-row{display:flex;align-items:center;padding:6px 14px;border-top:1px solid #0f0;background:#000;}
.term-prompt{color:#0f0;font-family:monospace;font-size:14px;margin-right:6px;white-space:nowrap;}
.term-input{flex:1;background:transparent;border:none;color:#0f0;font-family:monospace;font-size:14px;outline:none;}

/* Inspect menu */
.inspect-page{position:fixed;inset:0;background:#0a0a0a;z-index:5;display:flex;flex-direction:column;}
.inspect-tabs{display:flex;background:#000;border-bottom:1px solid rgba(0,255,0,0.2);}
.inspect-tab{padding:8px 18px;cursor:pointer;font-family:monospace;font-size:13px;color:#0a0;border-right:1px solid rgba(0,255,0,0.25);border-bottom:2px solid transparent;user-select:none;}
.inspect-tab:hover{color:#0f0;}
.inspect-tab.active{color:#0f0;border-bottom:2px solid #0f0;background:rgba(0,255,0,0.06);}
.inspect-body{flex:1;display:flex;overflow:hidden;}
.inspect-panel{display:none;flex:1;overflow:auto;padding:12px;font-family:monospace;font-size:13px;color:#0f0;line-height:1.6;}
.inspect-panel.active{display:flex;flex-direction:column;gap:6px;}
.inspect-section{border:1px solid rgba(0,255,0,0.2);padding:8px 12px;background:rgba(0,255,0,0.03);}
.inspect-section h3{margin:0 0 6px;color:#0f0;font-size:13px;border-bottom:1px solid rgba(0,255,0,0.2);padding-bottom:4px;}
.inspect-row{display:flex;gap:8px;padding:2px 0;border-bottom:1px solid rgba(0,255,0,0.07);}
.inspect-key{color:#0a0;min-width:200px;flex-shrink:0;}
.inspect-val{color:#0f0;word-break:break-all;}
.inspect-console-out{flex:1;overflow-y:auto;font-family:monospace;font-size:13px;line-height:1.6;white-space:pre-wrap;}
.inspect-console-row{display:flex;gap:10px;padding:3px 0;border-bottom:1px solid rgba(0,255,0,0.06);}
.inspect-console-row.error .inspect-console-msg{color:#f55;}
.inspect-console-row.warn .inspect-console-msg{color:#fa0;}
.inspect-console-row.info .inspect-console-msg{color:#4af;}
.inspect-console-level{min-width:40px;color:#0a0;font-size:11px;padding-top:2px;}
.inspect-console-msg{color:#0f0;word-break:break-all;}
.inspect-console-input-row{display:flex;gap:6px;padding:6px 0;border-top:1px solid #0f0;margin-top:4px;margin-bottom:28px;}
.inspect-console-input{flex:1;background:#111;color:#0f0;border:1px solid #0f0;font-family:monospace;font-size:13px;padding:4px 8px;outline:none;}
.inspect-net-row{display:flex;gap:0;border-bottom:1px solid rgba(0,255,0,0.1);padding:4px 0;font-size:12px;}
.inspect-net-row:hover{background:rgba(0,255,0,0.04);}
.inspect-net-status{min-width:40px;text-align:center;}
.inspect-net-method{min-width:55px;color:#4af;}
.inspect-net-url{flex:1;color:#0f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.inspect-net-type{min-width:70px;color:#0a0;}
.inspect-net-size{min-width:60px;color:#0a0;text-align:right;}
.inspect-net-time{min-width:60px;color:#0a0;text-align:right;padding-right:6px;}
.inspect-el-tree{font-family:monospace;font-size:12px;line-height:1.8;}
.inspect-el-tag{color:#4af;cursor:pointer;}
.inspect-el-tag:hover{text-decoration:underline;}
.inspect-el-attr{color:#fa0;}
.inspect-el-text{color:#0a0;}
.inspect-el-indent{display:inline-block;width:16px;}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;}
.status-dot.green{background:#0f0;box-shadow:0 0 6px #0f0;}
.status-dot.red{background:#f55;box-shadow:0 0 6px #f55;}
.status-dot.yellow{background:#fa0;box-shadow:0 0 6px #fa0;}

/* Hide scrollbars globally */
*{scrollbar-width:none;}
*::-webkit-scrollbar{display:none;}

/* Background ambience canvas */
#bgAmbience{position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:2;opacity:0;transition:opacity 0.5s;}



/* App overlay (notepad, calc, explorer) */
.app-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:50;display:flex;justify-content:center;align-items:center;}
.app-window{background:#111;border:2px solid #0f0;font-family:monospace;display:flex;flex-direction:column;box-shadow:0 0 30px rgba(0,255,0,0.3);}
.app-titlebar{background:#0f0;color:#000;padding:4px 10px;font-size:13px;font-weight:bold;display:flex;justify-content:space-between;align-items:center;user-select:none;}
.app-close{background:transparent;border:none;color:#000;font-size:16px;cursor:pointer;font-family:monospace;padding:0 4px;font-weight:bold;margin:0;}
.app-close:hover{background:#000;color:#0f0;border:none;}
.app-menubar{background:#1a1a1a;border-bottom:1px solid #0f0;display:flex;gap:0;}
.app-menubar button{background:transparent;color:#0f0;border:none;border-right:1px solid rgba(0,255,0,0.2);padding:4px 12px;font-family:monospace;font-size:12px;cursor:pointer;margin:0;}
.app-menubar button:hover{background:rgba(0,255,0,0.1);}

/* Notepad */
.notepad-window{width:660px;height:420px;}
.notepad-ta{flex:1;background:#0a0a0a;color:#0f0;border:none;padding:10px;font-family:monospace;font-size:13px;resize:none;outline:none;line-height:1.6;}
.notepad-statusbar{padding:3px 8px;background:#1a1a1a;border-top:1px solid #0f0;font-size:11px;color:#0a0;display:flex;gap:20px;}

/* Calculator */
.calc-window{width:280px;}
.calc-display{background:#000;color:#0f0;font-size:22px;text-align:right;padding:10px 14px;border-bottom:1px solid #0f0;min-height:36px;font-family:monospace;letter-spacing:2px;text-shadow:0 0 8px #0f0;}
.calc-expr{background:#000;color:#0a0;font-size:12px;text-align:right;padding:2px 14px 4px;border-bottom:1px solid rgba(0,255,0,0.15);min-height:16px;font-family:monospace;}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(0,255,0,0.2);border-top:1px solid #0f0;}
.calc-btn{background:#000;color:#0f0;border:none;padding:14px 0;font-family:monospace;font-size:15px;cursor:pointer;margin:0;transition:background 0.1s;}
.calc-btn:hover{background:#0f0;color:#000;}
.calc-btn.op{color:#0f0;background:#001a00;}
.calc-btn.op:hover{background:#0f0;color:#000;}
.calc-btn.eq{background:#003300;color:#0f0;text-shadow:0 0 6px #0f0;}
.calc-btn.eq:hover{background:#0f0;color:#000;}
.calc-btn.wide{grid-column:span 2;}
.calc-btn.clear{color:#f55;}
.calc-btn.clear:hover{background:#f55;color:#000;}

/* Explorer */
.explorer-window{width:700px;height:440px;display:flex;flex-direction:column;}
.explorer-toolbar-row{display:flex;align-items:center;gap:6px;padding:5px 8px;background:#1a1a1a;border-bottom:1px solid rgba(0,255,0,0.2);}
.explorer-addr{flex:1;background:#0a0a0a;color:#0f0;border:1px solid rgba(0,255,0,0.4);padding:4px 8px;font-family:monospace;font-size:12px;outline:none;}
.explorer-body{flex:1;display:flex;overflow:hidden;}
.explorer-tree{width:170px;border-right:1px solid #0f0;overflow-y:auto;padding:6px 0;font-size:12px;}
.explorer-tree-item{padding:4px 10px;cursor:pointer;color:#0a0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.explorer-tree-item:hover{background:rgba(0,255,0,0.07);color:#0f0;}
.explorer-tree-item.selected{background:rgba(0,255,0,0.15);color:#0f0;}
.explorer-main{flex:1;overflow-y:auto;padding:8px;}
.explorer-items{display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start;}
.explorer-item{width:80px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 4px;cursor:pointer;border:1px solid transparent;}
.explorer-item:hover{background:rgba(0,255,0,0.07);border-color:rgba(0,255,0,0.3);}
.explorer-item.selected{background:rgba(0,255,0,0.15);border-color:#0f0;}
.explorer-icon{font-size:22px;line-height:1;}
.explorer-label{font-size:11px;color:#0f0;text-align:center;word-break:break-word;line-height:1.3;}
.explorer-statusbar{padding:3px 10px;background:#1a1a1a;border-top:1px solid #0f0;font-size:11px;color:#0a0;}

/* Games */
.game-window{position:fixed;inset:0;background:#000;z-index:60;display:flex;flex-direction:column;}
.game-inner{flex:1;display:flex;flex-direction:column;width:100%;height:100%;min-height:0;}
.game-canvas-wrap{flex:1;position:relative;background:#000;overflow:hidden;display:flex;justify-content:center;align-items:center;}
.game-canvas-wrap canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;height:100%;width:auto;}
.game-info{padding:5px 14px;background:#111;border-top:1px solid #0f0;font-size:12px;color:#0a0;display:flex;gap:20px;align-items:center;flex-shrink:0;}
.game-info span{color:#0f0;}
.game-exit-btn{position:absolute;top:8px;right:8px;z-index:5;background:rgba(0,0,0,0.7);color:#0f0;border:1px solid rgba(0,255,0,0.4);font-family:monospace;font-size:12px;padding:4px 10px;cursor:pointer;}
.game-exit-btn:hover{background:rgba(0,255,0,0.15);border-color:#0f0;}
</style>
</head>
<body>
<script>
/* ── helpers ── */
function normalizeURL(url){url=url.trim();if(!url)return"";if(/^https?:\/\//i.test(url))return url;return"https://"+url;}
function clearBody(){
  // Remove all body children EXCEPT the ambience canvas, toggle button, and settings UI
  Array.from(document.body.children).forEach(el=>{
    if(el.id!=='bgAmbience'&&el.id!=='ambienceToggle'&&el.id!=='settingsBtn'&&el.id!=='settingsPopup') el.remove();
  });
  // Hide settings when not on menu/games pages
  const sb=document.getElementById('settingsBtn');
  const sp=document.getElementById('settingsPopup');
  if(sb) sb.style.display='none';
  if(sp) sp.style.display='none';
}
function makeBtn(label,fn){const b=document.createElement("button");b.textContent=label;b.onclick=fn;return b;}
function addCopyright(){const c=document.createElement("div");c.className="copyright";c.innerHTML="&copy; 2026 &mdash; Jon Stearns";document.body.appendChild(c);}
  document.addEventListener("keydown",function(e){
    if((e.ctrlKey||e.metaKey)&&e.key==="a"){
      const t=document.activeElement;
      const ok=t&&(t.tagName==="TEXTAREA"||(t.tagName==="INPUT"&&t.type!=="button"&&t.type!=="checkbox"&&t.type!=="radio"));
      if(!ok)e.preventDefault();
    }
  },true);

/* Terminal print — only set when inside showTerminal(); null otherwise.
   Game launchers check window._termPrint instead of the native window.print
   to avoid accidentally triggering the browser's PDF/print dialog. */
window._termPrint = null;

/* Global executables registry — populated by showTerminal() but accessible
   everywhere (e.g. File Explorer double-click outside terminal context). */
window._globalExecutables = {};

function showIframeGame(srcdoc,goBack,showBack){
  clearBody();

function showIframeGameWithExceptionBack(srcdoc,goBack){
  clearBody();
  const iframe=document.createElement("iframe");
  iframe.style.cssText="position:fixed;inset:0;width:100vw;height:100vh;border:none;z-index:3;background:#000;";

  // Inject a postMessage hook into srcdoc so the iframe can signal us on exception
  const injected=srcdoc.replace(
    "window.onerror=()=>{",
    "window.onerror=()=>{try{window.parent.postMessage('game-exception','*');}catch(e){}"
  );
  iframe.srcdoc=injected;

  window.addEventListener("message",function onMsg(e){
    if(e.data==="game-exception"){
      window.removeEventListener("message",onMsg);
      _ilog("error","Game crashed: unhandled exception in game iframe");
      if(goBack)goBack();
    }
  });

  document.body.appendChild(iframe);
  addCopyright();
}

// Format dB value — always show one decimal for .5 steps, whole number otherwise.
// The label div is fixed-width so this never causes reflow.
function fmtDB(val) {
  if (val === 0) return "0";
  const s = Number.isInteger(val) ? String(val) : val.toFixed(1);
  return val > 0 ? "+" + s : s;
}

// Build EQ sliders
function buildEQ(){
  eqBody.innerHTML="";

  // Preamp
  const preampCol=document.createElement("div"); preampCol.className="eq-preamp";
  const paLabel=document.createElement("div"); paLabel.className="eq-preamp-label"; paLabel.textContent="PREAMP";
  const paValEl=document.createElement("div"); paValEl.className="eq-preamp-val"; paValEl.id="preampVal"; paValEl.textContent="0";
  const paWrap=document.createElement("div"); paWrap.className="eq-slider-wrap";
  const paSlider=document.createElement("input");
  paSlider.type="range"; paSlider.className="eq-vslider"; paSlider.id="eqPreampSlider";
  paSlider.min=-12; paSlider.max=12; paSlider.step=0.5; paSlider.value=0;
  paSlider.oninput=()=>{
    preampVal=parseFloat(paSlider.value);
    paValEl.textContent=fmtDB(preampVal);
    if(preampNode) preampNode.gain.value=eqActive?dbToGain(preampVal):1;
  };
  paWrap.appendChild(paSlider);
  [paLabel,paWrap,paValEl].forEach(el=>preampCol.appendChild(el));
  eqBody.appendChild(preampCol);

  // Bands
  const bandsDiv=document.createElement("div"); bandsDiv.className="eq-bands";
  EQ_BANDS.forEach((band,i)=>{
    const col=document.createElement("div"); col.className="eq-band";
    const lbl=document.createElement("div"); lbl.className="eq-band-label"; lbl.textContent=band.label;
    const valEl=document.createElement("div"); valEl.className="eq-band-val"; valEl.id="eqVal"+i; valEl.textContent="0";
    const wrap=document.createElement("div"); wrap.className="eq-slider-wrap";
    const slider=document.createElement("input");
    slider.type="range"; slider.className="eq-vslider"; slider.id="eqSlider"+i;
    slider.min=-12; slider.max=12; slider.step=0.5; slider.value=0;
    slider.oninput=()=>{
      const val=parseFloat(slider.value);
      eqGains[i]=val;
      valEl.textContent=fmtDB(val);
      if(eqFilters[i]) eqFilters[i].gain.value=eqActive?val:0;
    };
    wrap.appendChild(slider);
    [lbl,wrap,valEl].forEach(el=>col.appendChild(el));
    bandsDiv.appendChild(col);
  });
  eqBody.appendChild(bandsDiv);
}

};

eqReset.onclick=()=>{

function applyEQValues(){
  if(preampNode) preampNode.gain.value=eqActive?dbToGain(preampVal):1;
  eqFilters.forEach((f,i)=>{f.gain.value=eqActive?eqGains[i]:0;});
}
function dbToGain(db){return Math.pow(10,db/20);}

// Web Audio graph — built once, source node reused
function setupAudioGraph(){
  if(audioCtx) return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    preampNode=audioCtx.createGain(); preampNode.gain.value=1;
    // Limiter after preamp to prevent clipping/crackling
    limiterNode=audioCtx.createDynamicsCompressor();
    limiterNode.threshold.value=-1;
    limiterNode.knee.value=0;
    limiterNode.ratio.value=20;
    limiterNode.attack.value=0.001;
    limiterNode.release.value=0.1;
    eqFilters=EQ_BANDS.map((band,i)=>{
      const f=audioCtx.createBiquadFilter();
      f.type=(i===0)?"lowshelf":(i===EQ_BANDS.length-1)?"highshelf":"peaking";
      f.frequency.value=band.freq; f.Q.value=1.2; f.gain.value=0;
      return f;
    });
    analyser=audioCtx.createAnalyser(); analyser.fftSize=128;
    source=audioCtx.createMediaElementSource(audio);
    source.connect(preampNode);
    preampNode.connect(limiterNode);
    limiterNode.connect(eqFilters[0]);
    for(let i=0;i<eqFilters.length-1;i++) eqFilters[i].connect(eqFilters[i+1]);
    eqFilters[eqFilters.length-1].connect(analyser);
    analyser.connect(audioCtx.destination);
    applyEQValues();
  }catch(e){console.warn("Web Audio unavailable:",e);}
}

// Visualizer
function startVisualizer(){
  if(!analyser) return;
  if(audioCtx.state==="suspended") audioCtx.resume();
  cancelAnimationFrame(animFrame);
  const bufLen=analyser.frequencyBinCount, data=new Uint8Array(bufLen);
  function frame(){
    animFrame=requestAnimationFrame(frame);
    analyser.getByteFrequencyData(data);
    vctx.fillStyle="#000"; vctx.fillRect(0,0,vis.width,vis.height);
    const barW=(vis.width/bufLen)*1.8; let x=0;
    for(let i=0;i<bufLen;i++){
      const barH=(data[i]/255)*vis.height;
      const g=Math.max(40,Math.floor((data[i]/255)*255));
      vctx.fillStyle=\`rgb(0,\${g},0)\`;
      vctx.fillRect(x,vis.height-barH,barW-1,barH); x+=barW;
    }
    vctx.fillStyle="rgba(0,0,0,0.15)";
    for(let y=0;y<vis.height;y+=2) vctx.fillRect(0,y,vis.width,1);
  }
  frame();
}

(function idleVis(){
  let t=0;
  function frame(){
    if(analyser) return;
    animFrame=requestAnimationFrame(frame);
    vctx.fillStyle="#000"; vctx.fillRect(0,0,vis.width,vis.height);
    if(isPlaying){
      const bars=42,barW=vis.width/bars;
      for(let i=0;i<bars;i++){
        const barH=(Math.sin(t*0.05+i*0.4)*0.4+0.5)*vis.height*0.85;
        const g=Math.floor((barH/vis.height)*200+55);
        vctx.fillStyle=\`rgb(0,\${g},0)\`;
        vctx.fillRect(i*barW,vis.height-barH,barW-1,barH);
      }
    }
    vctx.fillStyle="rgba(0,0,0,0.15)";
    for(let y=0;y<vis.height;y+=2) vctx.fillRect(0,y,vis.width,1);
    t++;
  }
  frame();
})();

document.body.addEventListener("dragover",e=>e.preventDefault());
document.body.addEventListener("drop",e=>{
  e.preventDefault();
  const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith("audio/"));
  if(files.length) loadFiles(files);
});

function loadFiles(files){
  files.forEach(file=>{tracks.push({name:file.name.replace(/\\.[^.]+$/,""),url:URL.createObjectURL(file),file});});
  renderPlaylist();
  statusRight.textContent=tracks.length+" TRACK"+(tracks.length!==1?"S":"");
  if(currentIdx===-1) playIdx(0);
}

function renderPlaylist(){
  plList.innerHTML="";
  tracks.forEach((t,i)=>{
    const item=document.createElement("div"); item.className="player-pl-item"+(i===currentIdx?" active":"");
    const num=document.createElement("span"); num.className="player-pl-num"; num.textContent=(i+1).toString().padStart(2,"0");
    const name=document.createElement("span"); name.className="player-pl-name"; name.textContent=t.name;
    const dur=document.createElement("span"); dur.className="player-pl-dur"; dur.textContent=t.duration||"--:--";
    item.addEventListener("contextmenu",e=>{
      e.preventDefault(); URL.revokeObjectURL(t.url); tracks.splice(i,1);
      if(currentIdx===i){audio.pause();isPlaying=false;playBtn.innerHTML="&#9654;&#xFE0E;";currentIdx=-1;statusLeft.textContent="STOPPED";}
      else if(currentIdx>i) currentIdx--;
      renderPlaylist(); statusRight.textContent=tracks.length+" TRACK"+(tracks.length!==1?"S":"");
    });
    item.onclick=()=>playIdx(i);
    [num,name,dur].forEach(el=>item.appendChild(el));
    plList.appendChild(item);
  });
}

function playIdx(idx){
  if(!tracks.length) return;
  idx=((idx%tracks.length)+tracks.length)%tracks.length;
  currentIdx=idx;
  const t=tracks[idx];
  setupAudioGraph();
  if(audioCtx&&audioCtx.state==="suspended") audioCtx.resume();
  audio.src=t.url;
  audio.load();
  audio.play().then(()=>{
    isPlaying=true;
    playBtn.innerHTML="&#9646;&#xFE0E;&#9646;&#xFE0E;";
    statusLeft.textContent="PLAYING";
    trackTitle.textContent=t.name.toUpperCase();
    trackMeta.textContent=formatBytes(t.file.size)+" \\xb7 "+t.file.type.replace("audio/","").toUpperCase();
    renderPlaylist();
    startVisualizer();
  }).catch(err=>{console.warn("Playback failed:",err);statusLeft.textContent="ERROR";});
}

function playNext(){
  if(!tracks.length) return;
  if(repeatMode===2){audio.currentTime=0;audio.play();return;}
  if(isShuffle){playIdx(Math.floor(Math.random()*tracks.length));return;}
  const next=currentIdx+1;
  if(next>=tracks.length){if(repeatMode===1)playIdx(0);else{isPlaying=false;playBtn.innerHTML="&#9654;&#xFE0E;";statusLeft.textContent="STOPPED";}}
  else playIdx(next);
}

function togglePlay(){
  if(!tracks.length){document.getElementById("plAdd").click();return;}
  if(currentIdx===-1){playIdx(0);return;}
  if(isPlaying){audio.pause();isPlaying=false;playBtn.innerHTML="&#9654;&#xFE0E;";statusLeft.textContent="PAUSED";}
  else{if(audioCtx&&audioCtx.state==="suspended")audioCtx.resume();audio.play().then(()=>{isPlaying=true;playBtn.innerHTML="&#9646;&#xFE0E;&#9646;&#xFE0E;";statusLeft.textContent="PLAYING";}).catch(()=>{});}
}

audio.addEventListener("ended",playNext);
audio.addEventListener("timeupdate",()=>{
  if(!audio.duration) return;
  seek.value=(audio.currentTime/audio.duration)*1000;
  timeEl.textContent=formatTime(audio.currentTime)+" / "+formatTime(audio.duration);
  if(tracks[currentIdx]&&!tracks[currentIdx].duration){tracks[currentIdx].duration=formatTime(audio.duration);renderPlaylist();}
});

function formatTime(s){if(!s||isNaN(s))return"0:00";return Math.floor(s/60)+":"+Math.floor(s%60).toString().padStart(2,"0");}
function formatBytes(b){if(b<1048576)return(b/1024).toFixed(0)+" KB";return(b/1048576).toFixed(1)+" MB";}

document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT") return;
  if(e.code==="Space"){e.preventDefault();togglePlay();}
  if(e.code==="ArrowRight") audio.currentTime=Math.min(audio.duration||0,audio.currentTime+5);
  if(e.code==="ArrowLeft")  audio.currentTime=Math.max(0,audio.currentTime-5);
  if(e.code==="ArrowUp")    {volSlider.value=Math.min(100,+volSlider.value+5);volSlider.oninput();}
  if(e.code==="ArrowDown")  {volSlider.value=Math.max(0,+volSlider.value-5);volSlider.oninput();}
});

    const msgInput=document.createElement('input');msgInput.type='text';msgInput.id='rtc-chatInput';msgInput.placeholder='TYPE MESSAGE...';
    msgInput.style.cssText='flex:1;background:#050505;border:1px solid rgba(0,255,0,0.2);padding:8px 10px;color:#0f0;font-family:monospace;font-size:12px;outline:none;';
    msgInput.onfocus=()=>msgInput.style.borderColor='#0f0';
    msgInput.onblur=()=>msgInput.style.borderColor='rgba(0,255,0,0.2)';
    msgInput.onkeydown=e=>{if(e.key==='Enter')_sendMsg();};
    const sendBtn=document.createElement('button');sendBtn.id='rtc-sendBtn';sendBtn.textContent='SEND';sendBtn.disabled=true;
    sendBtn.style.cssText='background:transparent;color:#0f0;border:1px solid #0f0;font-family:monospace;font-size:12px;padding:8px 14px;letter-spacing:2px;cursor:pointer;';
    sendBtn.onmouseover=()=>{if(!sendBtn.disabled){sendBtn.style.background='#0f0';sendBtn.style.color='#000';}};
    sendBtn.onmouseout=()=>{sendBtn.style.background='transparent';sendBtn.style.color='#0f0';};
    sendBtn.onclick=_sendMsg;
    inputBar.appendChild(msgInput);inputBar.appendChild(sendBtn);

    /* log bar */
    const logEl=document.createElement('div');logEl.id='rtc-log';
    logEl.style.cssText='font-size:10px;color:#0a0;padding:6px 12px;max-height:48px;overflow-y:auto;border-top:1px solid rgba(0,255,0,0.2);letter-spacing:1px;line-height:1.8;background:#000;';

    main.appendChild(chatArea);main.appendChild(inputBar);main.appendChild(logEl);

    page.appendChild(hdr);page.appendChild(sb);page.appendChild(main);
    document.body.appendChild(page);

    /* ── toast ── */
    const toastEl=document.createElement('div');toastEl.id='rtc-toast';
    toastEl.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#111;border:1px solid #0f0;padding:10px 20px;font-family:monospace;font-size:11px;color:#0f0;z-index:9999;transition:transform 0.25s ease;pointer-events:none;white-space:nowrap;letter-spacing:2px;box-shadow:0 0 20px rgba(0,255,0,0.15);';
    document.body.appendChild(toastEl);

    /* ── helper fns ── */
    let _toastTimer;
    function _toast(msg){
      toastEl.textContent='> '+msg;toastEl.style.transform='translateX(-50%) translateY(0)';
      clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>toastEl.style.transform='translateX(-50%) translateY(60px)',2800);
    }
    function _log(msg,type){
      const sp=document.createElement('span');
      sp.style.color=type==='ok'?'#0f0':type==='err'?'#f55':type==='warn'?'#fa0':'rgba(0,170,0,0.6)';
      sp.textContent='['+new Date().toLocaleTimeString()+'] '+msg+'  ';
      logEl.appendChild(sp);logEl.scrollTop=logEl.scrollHeight;
    }
    function _setSig(state){
      const dot=document.getElementById('rtc-sigDot');const txt=document.getElementById('rtc-sigText');
      if(!dot)return;
      const map={ok:'background:#0f0;box-shadow:0 0 6px #0f0;',err:'background:#f55;box-shadow:0 0 6px #f55;',connecting:'background:#fa0;box-shadow:0 0 6px #fa0;animation:rtc-blink 0.8s infinite;'};
      dot.style.cssText='width:7px;height:7px;border-radius:50%;transition:all 0.3s;'+(map[state]||'background:#333;');
      txt.textContent=state==='ok'?'SIGNAL OK':state==='err'?'NO SIGNAL':'SIGNAL...';
    }
    function _setSt(state){
      const dot=document.getElementById('rtc-stDot');const txt=document.getElementById('rtc-stText');
      if(!dot)return;
      const map={online:'background:#0f0;box-shadow:0 0 6px #0f0;',connected:'background:#0f0;box-shadow:0 0 6px #0f0;animation:rtc-blink 1.5s infinite;',offline:'background:#333;'};
      dot.style.cssText='width:7px;height:7px;border-radius:50%;transition:all 0.3s;'+(map[state]||'background:#333;');
      txt.textContent=state==='online'?'ONLINE':state==='connected'?'CONNECTED':'OFFLINE';
    }
    function _refreshBtn(){
      const has=document.getElementById('rtc-remoteId').value.trim().length>0;
      const p=window._rtcPeer;
      const ready=p&&!p.disconnected&&!p.destroyed;
      const btn=document.getElementById('rtc-conBtn');
      if(btn)btn.disabled=!has||!ready||!!window._rtcConn;
    }
    function _copyId(){
      const id=document.getElementById('rtc-myId').textContent;
      navigator.clipboard.writeText(id).then(()=>_toast('PEER ID COPIED')).catch(()=>{
        const ta=document.createElement('textarea');ta.value=id;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);_toast('PEER ID COPIED');
      });
    }
    function _escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    function _addMsg(text,who){
      const msgsEl=document.getElementById('rtc-msgs');if(!msgsEl)return;
      const d=document.createElement('div');
      d.style.cssText='display:flex;flex-direction:column;gap:3px;max-width:70%;animation:rtc-msgIn 0.15s ease;'+(who==='me'?'align-self:flex-end;align-items:flex-end;':'align-self:flex-start;align-items:flex-start;');
      const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      const bubble=document.createElement('div');
      bubble.style.cssText='padding:10px 14px;font-family:monospace;font-size:12px;line-height:1.6;border:1px solid '+(who==='me'?'rgba(0,255,0,0.3);background:rgba(0,255,0,0.08);color:#0f0;':'rgba(0,255,0,0.2);background:#050505;color:#0a0;');
      bubble.textContent=text;
      const meta=document.createElement('div');meta.style.cssText='font-size:9px;color:rgba(0,170,0,0.5);letter-spacing:1px;';meta.textContent=(who==='me'?'YOU':'PEER')+' · '+t;
      d.appendChild(bubble);d.appendChild(meta);msgsEl.appendChild(d);msgsEl.scrollTop=msgsEl.scrollHeight;
    }
    function _showChat(){
      const idle=document.getElementById('rtc-idle');const m=document.getElementById('rtc-msgs');
      if(idle)idle.style.display='none';if(m){m.style.display='flex';}
    }
    function _setupConn(conn){
      window._rtcConn=conn;
      conn.on('open',()=>{
        _log('DATA CHANNEL OPEN · LINKED TO '+conn.peer,'ok');_toast('CONNECTED TO '+conn.peer);
        _setSt('connected');_showChat();
        const sb=document.getElementById('rtc-sendBtn');if(sb)sb.disabled=false;
        const cb=document.getElementById('rtc-conBtn');if(cb)cb.style.display='none';
        const db=document.getElementById('rtc-disBtn');if(db)db.style.display='flex';
        _refreshBtn();
      });
      conn.on('data',data=>{
        try{const msg=typeof data==='string'?JSON.parse(data):data;if(msg.type==='chat')_addMsg(msg.text,'them');}
        catch{_addMsg(String(data),'them');}
      });
      conn.on('close',()=>{_log('DATA CHANNEL CLOSED','warn');_toast('PEER DISCONNECTED');_handleDisc();});
      conn.on('error',e=>{_log('DATA ERROR: '+e.message,'err');_handleDisc();});
    }
    function _handleDisc(){
      window._rtcConn=null;_setSt('online');
      const sb=document.getElementById('rtc-sendBtn');if(sb)sb.disabled=true;
      const cb=document.getElementById('rtc-conBtn');if(cb)cb.style.display='flex';
      const db=document.getElementById('rtc-disBtn');if(db)db.style.display='none';
      _refreshBtn();
    }
    function _connectChat(){
      const rid=document.getElementById('rtc-remoteId').value.trim();
      if(!rid){_toast('ENTER A PEER ID');return;}
      const p=window._rtcPeer;if(!p||p.disconnected){_toast('SIGNALING NOT CONNECTED');return;}
      _log('CONNECTING TO '+rid+'...');
      const conn=p.connect(rid,{reliable:true});
      _setupConn(conn);_toast('CONNECTING TO '+rid+'...');
    }
    function _disconnectChat(){
      if(window._rtcConn){window._rtcConn.close();window._rtcConn=null;}
      _handleDisc();_log('DISCONNECTED BY USER','warn');_toast('DISCONNECTED');
    }
    function _sendMsg(){
      const inp=document.getElementById('rtc-chatInput');if(!inp)return;
      const text=inp.value.trim();if(!text)return;
      const c=window._rtcConn;if(!c||!c.open){_toast('NOT CONNECTED');return;}
      c.send(JSON.stringify({type:'chat',text}));_addMsg(text,'me');inp.value='';
    }

    /* inject keyframe styles */
    if(!document.getElementById('rtc-styles')){
      const st=document.createElement('style');st.id='rtc-styles';
      st.textContent='@keyframes rtc-blink{0%,100%{opacity:1;}50%{opacity:0.3;}}@keyframes rtc-msgIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}';
      document.head.appendChild(st);
    }

    /* ── init PeerJS ── */
    window._rtcConn=null;
    _setSig('connecting');_setSt('offline');

    const peer=new Peer(undefined,{debug:0});
    window._rtcPeer=peer;

    peer.on('open',id=>{
      const el=document.getElementById('rtc-myId');if(el)el.textContent=id;
      _setSig('ok');_setSt('online');_log('NODE INITIALIZED · ID: '+id,'ok');_refreshBtn();
    });
    peer.on('error',err=>{
      _log('PEER ERROR: '+err.type,'err');_setSig('err');
      if(['server-error','socket-error','socket-closed','network'].includes(err.type)){
        _setSig('connecting');setTimeout(()=>{if(window._rtcPeer===peer)peer.reconnect();},4000);
      }
    });
    peer.on('disconnected',()=>{
      _setSig('err');_log('SIGNALING DISCONNECTED — RECONNECTING...','warn');
      if(window._rtcPeer===peer)peer.reconnect();
    });
    peer.on('connection',conn=>{
      _log('INCOMING CHAT FROM '+conn.peer,'warn');_toast('INCOMING MESSAGE FROM '+conn.peer);
      _setupConn(conn);
      const ri=document.getElementById('rtc-remoteId');if(ri)ri.value=conn.peer;
      _refreshBtn();
    });
  }

  /* load PeerJS if needed, then init */
  const isTerminal=bindEscIfTerminal(goBack);
  function _initRTCWrapped(){ _initRTC(isTerminal); }
  if(typeof Peer==='undefined'){
    const s=document.createElement('script');
    s.src='https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
    s.onload=_initRTCWrapped;
    s.onerror=()=>{
      clearBody();
      const err=document.createElement('div');
      err.style.cssText='position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-family:monospace;z-index:5;';
      err.innerHTML='<div style="color:#f55;font-size:14px;letter-spacing:4px;">PEERJS LOAD FAILED</div><div style="color:#0a0;font-size:11px;">Check your internet connection.</div>';
      if(!isTerminal){const b=document.createElement('button');b.textContent='[ EXIT ]';b.style.cssText='margin-top:10px;background:#000;color:#f55;border:1px solid rgba(255,85,85,0.5);font-family:monospace;font-size:13px;padding:8px 20px;cursor:pointer;letter-spacing:2px;';b.onclick=goBack;err.appendChild(b);}
      document.body.appendChild(err);
    };
    document.head.appendChild(s);
  } else {
    _initRTCWrapped();
  }
}

        .file-icons a:hover { color: var(--green); }

        .action-btn {
            background: transparent;
            border: 1px solid var(--green-border);
            color: var(--green-dim);
            font-family: monospace;
            font-size: 11px;
            padding: 3px 10px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.15s;
        }
        .action-btn:hover {
            background: var(--green-faint);
            border-color: var(--green);
            color: var(--green);
        }

        .user-details {
            display: none;
            margin-top: 10px;
            border: 1px solid var(--green-border);
            padding: 12px;
            background: var(--bg-panel);
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 0;
            float: left;
            margin-right: 14px;
            border: 1px solid var(--green-border);
            filter: grayscale(100%) contrast(1.2);
            mix-blend-mode: screen;
        }

        .user-info h4 { color: var(--green); font-size: 14px; margin-bottom: 4px; letter-spacing: 2px; }
        .user-info p { font-size: 11px; color: rgba(0,255,0,0.65); margin-bottom: 3px; letter-spacing: 0.5px; }

        .user-stats {
            clear: both;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid var(--green-border);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 11px;
            color: var(--green-dim);
            letter-spacing: 1px;
        }

        .user-links a { color: var(--green); text-decoration: none; font-size: 11px; display: block; margin-top: 2px; }
        .user-links a:hover { text-decoration: underline; }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 12px 0;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--green-dim);
        }

        .page-btn {
            background: transparent;
            border: 1px solid var(--green-border);
            color: var(--green-dim);
            font-family: monospace;
            font-size: 11px;
            padding: 5px 14px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.15s;
        }
        .page-btn:hover:not(:disabled) {
            background: var(--green-faint);
            border-color: var(--green);
            color: var(--green);
        }
        .page-btn:disabled { opacity: 0.3; cursor: default; }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.03) 2px,
                rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body>
<div class="app">

    <div class="app-header">
        <span class="app-title">gitfetch</span>
        <span class="app-badge"><i class="fab fa-github"></i>&nbsp; API</span>
        <span class="app-badge" style="margin-left:auto;border-color:transparent;color:rgba(0,255,0,0.25);letter-spacing:1px;font-size:9px;">original code by dinguschan</span>
        <button id="backBtn" onclick="window.parent.postMessage('gitfetch-back','*')" style="display:none;margin-left:12px;background:transparent;border:1px solid rgba(255,85,85,0.35);color:#f55;font-family:monospace;font-size:11px;padding:4px 14px;letter-spacing:2px;cursor:pointer;transition:background 0.15s,border-color 0.15s;" onmouseover="this.style.background='rgba(255,85,85,0.1)';this.style.borderColor='#f55';" onmouseout="this.style.background='transparent';this.style.borderColor='rgba(255,85,85,0.35)';">&#x2190; BACK</button>
    </div>

    <div class="app-body">

        <div class="sidebar">
            <div class="sidebar-header">// FILTERS</div>
            <div class="sidebar-scroll">

                <div class="filter-group">
                    <span class="filter-group-label">// Search Type</span>
                    <div class="filter-option">
                        <input type="radio" id="searchRepos" name="searchType" value="repositories" checked>
                        <label for="searchRepos">Repositories</label>
                    </div>
                    <div class="filter-option">
                        <input type="radio" id="searchUsers" name="searchType" value="users">
                        <label for="searchUsers">Users</label>
                    </div>
                </div>

                <hr class="divider">

                <div class="filter-group">
                    <span class="filter-group-label">// Display</span>
                    <div class="filter-option">
                        <input type="checkbox" id="showStars" checked>
                        <label for="showStars">Stars</label>
                    </div>
                    <div class="filter-option">
                        <input type="checkbox" id="showForks" checked>
                        <label for="showForks">Forks</label>
                    </div>
                    <div class="filter-option">
                        <input type="checkbox" id="showWatchers" checked>
                        <label for="showWatchers">Watchers</label>
                    </div>
                    <div class="filter-option">
                        <input type="checkbox" id="showIssues" checked>
                        <label for="showIssues">Issues</label>
                    </div>
                </div>

                <hr class="divider">

                <div class="filter-group">
                    <span class="filter-group-label">// Min Stars</span>
                    <div class="filter-num-label"><span>VALUE</span><span id="minStarsValue">0</span></div>
                    <input class="filter-num" type="number" id="minStars" min="0" max="50000" value="0" step="1">
                </div>

                <div class="filter-group">
                    <span class="filter-group-label">// Min Forks</span>
                    <div class="filter-num-label"><span>VALUE</span><span id="minForksValue">0</span></div>
                    <input class="filter-num" type="number" id="minForks" min="0" max="20000" value="0" step="1">
                </div>

                <hr class="divider">

                <div class="filter-group">
                    <span class="filter-group-label">// Language</span>
                    <div class="filter-option"><input type="checkbox" id="langJavaScript" value="javascript"><label for="langJavaScript">JavaScript</label></div>
                    <div class="filter-option"><input type="checkbox" id="langPython" value="python"><label for="langPython">Python</label></div>
                    <div class="filter-option"><input type="checkbox" id="langJava" value="java"><label for="langJava">Java</label></div>
                    <div class="filter-option"><input type="checkbox" id="langCPP" value="cpp"><label for="langCPP">C++</label></div>
                    <div class="filter-option"><input type="checkbox" id="langHTML" value="html"><label for="langHTML">HTML</label></div>
                    <div class="filter-option"><input type="checkbox" id="langCSS" value="css"><label for="langCSS">CSS</label></div>
                    <div class="filter-option"><input type="checkbox" id="langTypeScript" value="typescript"><label for="langTypeScript">TypeScript</label></div>
                    <div class="filter-option"><input type="checkbox" id="langC" value="c"><label for="langC">C</label></div>
                    <div class="filter-option"><input type="checkbox" id="langCSharp" value="csharp"><label for="langCSharp">C#</label></div>
                    <div class="filter-option"><input type="checkbox" id="langPHP" value="php"><label for="langPHP">PHP</label></div>
                    <div class="filter-option"><input type="checkbox" id="langRuby" value="ruby"><label for="langRuby">Ruby</label></div>
                    <div class="filter-option"><input type="checkbox" id="langGo" value="go"><label for="langGo">Go</label></div>
                    <div class="filter-option"><input type="checkbox" id="langRust" value="rust"><label for="langRust">Rust</label></div>
                    <div class="filter-option"><input type="checkbox" id="langSwift" value="swift"><label for="langSwift">Swift</label></div>
                    <div class="filter-option"><input type="checkbox" id="langKotlin" value="kotlin"><label for="langKotlin">Kotlin</label></div>
                    <div class="filter-option"><input type="checkbox" id="langDart" value="dart"><label for="langDart">Dart</label></div>
                </div>

            </div>
        </div>

        <div class="main">

            <div class="search-bar">
                <span class="search-prompt">root@github:~$</span>
                <input class="search-input" type="text" id="repoSearch"
                    placeholder="query... (use '#' for tags)"
                    onkeypress="if(event.key==='Enter') searchRepos()">
                <button class="search-btn" onclick="searchRepos()">EXEC</button>
            </div>

            <div class="results-wrap" id="results">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon"><i class="fab fa-github"></i></div>
                    <div class="empty-text">Awaiting Query</div>
                    <div class="empty-sub">type a search term and press EXEC</div>
                </div>
            </div>

            <div class="status-bar">
                <span><span class="status-dot" id="statusDot"></span><span id="statusText">IDLE</span></span>
                <span id="statusCount"></span>
            </div>

        </div>
    </div>
</div>

<script>
const searchInput = document.getElementById('repoSearch');
const resultsDiv = document.getElementById('results');
const emptyState = document.getElementById('emptyState');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const statusCount = document.getElementById('statusCount');

let currentSearchData = [];
let currentPage = 1;
let totalResults = 0;
const resultsPerPage = 30;

function setStatus(state, text, count) {
    statusDot.className = 'status-dot' + (state === 'active' ? ' active' : '');
    statusText.textContent = text;
    statusCount.textContent = count || '';
}

document.getElementById('minStars').addEventListener('input', function() {
    document.getElementById('minStarsValue').textContent = this.value;
    if (searchInput.value.trim()) searchRepos();
});

document.getElementById('minForks').addEventListener('input', function() {
    document.getElementById('minForksValue').textContent = this.value;
    if (searchInput.value.trim()) searchRepos();
});

document.querySelectorAll('input[type="checkbox"], input[type="radio"]').forEach(inp => {
    inp.addEventListener('change', () => {
        if (inp.name === 'searchType' || inp.id.startsWith('lang')) {
            if (searchInput.value.trim()) searchRepos();
        } else {
            filterResults();
        }
    });
});

function searchRepos(page = 1) {
    const query = searchInput.value.trim();
    const searchType = document.querySelector('input[name="searchType"]:checked').value;

    if (!query) {
        resultsDiv.innerHTML = '';
        resultsDiv.appendChild(emptyState);
        emptyState.style.display = 'flex';
        setStatus('', 'IDLE');
        return;
    }

    if (page === 1) {
        currentPage = 1;
        currentSearchData = [];
    }

    setStatus('active', 'FETCHING...');
    resultsDiv.innerHTML = '<div style="padding:20px;font-size:11px;letter-spacing:3px;color:rgba(0,255,0,0.4);">// scanning repositories...</div>';

    const searchQuery = buildSearchQuery(query);
    const apiUrl = \`https://api.github.com/search/\${searchType}?q=\${encodeURIComponent(searchQuery)}&page=\${page}&per_page=\${resultsPerPage}\`;

    fetch(apiUrl)
        .then(r => r.json())
        .then(data => {
            if (data.items && data.items.length) {
                currentSearchData = data.items;
                totalResults = data.total_count;
                currentPage = page;
                displayResults(data.items);
                setStatus('active', 'OK', \`\${totalResults.toLocaleString()} RESULTS\`);
            } else {
                resultsDiv.innerHTML = '<div style="padding:20px;font-size:11px;letter-spacing:2px;color:rgba(0,255,0,0.4);">// no results found</div>';
                totalResults = 0;
                setStatus('', 'NO RESULTS');
            }
        })
        .catch(err => {
            resultsDiv.innerHTML = '<div style="padding:20px;font-size:11px;letter-spacing:2px;color:rgba(255,80,80,0.7);">// error: api request failed</div>';
            setStatus('', 'ERROR');
        });
}

function buildSearchQuery(query) {
    let q = query;
    const minStars = document.getElementById('minStars').value;
    const minForks = document.getElementById('minForks').value;
    if (minStars > 0) q += \` stars:>=\${minStars}\`;
    if (minForks > 0) q += \` forks:>=\${minForks}\`;
    document.querySelectorAll('input[id^="lang"]:checked').forEach(inp => {
        q += \` language:\${inp.value}\`;
    });
    return q;
}

function displayResults(items) {
    const searchType = document.querySelector('input[name="searchType"]:checked').value;
    resultsDiv.innerHTML = '';

    const infoDiv = document.createElement('div');
    infoDiv.className = 'results-info';
    const start = (currentPage - 1) * resultsPerPage + 1;
    const end = Math.min(currentPage * resultsPerPage, totalResults);
    infoDiv.textContent = \`// showing \${start}–\${end} of \${totalResults.toLocaleString()} results  [page \${currentPage}]\`;
    resultsDiv.appendChild(infoDiv);

    items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'repo';

        if (searchType === 'repositories') {
            card.innerHTML = \`
                <div class="repo-title-row">
                    <a class="repo-link" href="#" onclick="fetchRepoFiles('\${item.full_name}', this); return false;">
                        \${item.owner.login}/<strong>\${item.name}</strong>
                    </a>
                    <button class="action-btn" onclick="downloadRepoZip('\${item.full_name}')">
                        <i class="fas fa-file-archive"></i> ZIP
                    </button>
                </div>
                <div class="repo-stats">
                    <span class="stars-stat"><i class="fas fa-star"></i> \${item.stargazers_count.toLocaleString()}</span>
                    <span class="forks-stat"><i class="fas fa-code-branch"></i> \${item.forks_count.toLocaleString()}</span>
                    <span class="watchers-stat"><i class="fas fa-eye"></i> \${item.watchers_count.toLocaleString()}</span>
                    <span class="issues-stat"><i class="fas fa-circle-exclamation"></i> \${item.open_issues_count.toLocaleString()}</span>
                </div>
                <div class="repo-desc">\${parseDescription(item.description)}</div>
                \${item.homepage ? \`<div class="repo-homepage"><i class="fas fa-link"></i> <a href="\${item.homepage}" target="_blank">\${item.homepage}</a></div>\` : ''}
                <div class="files"></div>
            \`;
        } else {
            card.innerHTML = \`
                <div class="repo-title-row">
                    <a class="repo-link" href="#" onclick="fetchUserDetails('\${item.login}', this); return false;">
                        \${item.login}
                    </a>
                    <button class="action-btn" onclick="window.open('\${item.html_url}','_blank')">
                        <i class="fab fa-github"></i> PROFILE
                    </button>
                </div>
                <div class="repo-desc">\${item.bio || '// no bio available'}</div>
                <div class="user-details"></div>
            \`;
        }

        resultsDiv.appendChild(card);
    });

    filterResults();

    const totalPages = Math.min(Math.ceil(totalResults / resultsPerPage), 34);
    if (totalPages > 1) {
        const pg = document.createElement('div');
        pg.className = 'pagination';

        const prev = document.createElement('button');
        prev.className = 'page-btn';
        prev.textContent = '← PREV';
        prev.disabled = currentPage === 1;
        prev.onclick = () => searchRepos(currentPage - 1);
        pg.appendChild(prev);

        const info = document.createElement('span');
        info.textContent = \`\${currentPage} / \${totalPages}\`;
        pg.appendChild(info);

        const next = document.createElement('button');
        next.className = 'page-btn';
        next.textContent = 'NEXT →';
        next.disabled = currentPage >= totalPages;
        next.onclick = () => searchRepos(currentPage + 1);
        pg.appendChild(next);

        resultsDiv.appendChild(pg);
    }
}

function filterResults() {
    const showStars = document.getElementById('showStars').checked;
    const showForks = document.getElementById('showForks').checked;
    const showWatchers = document.getElementById('showWatchers').checked;
    const showIssues = document.getElementById('showIssues').checked;
    document.querySelectorAll('.stars-stat').forEach(el => el.style.display = showStars ? '' : 'none');
    document.querySelectorAll('.forks-stat').forEach(el => el.style.display = showForks ? '' : 'none');
    document.querySelectorAll('.watchers-stat').forEach(el => el.style.display = showWatchers ? '' : 'none');
    document.querySelectorAll('.issues-stat').forEach(el => el.style.display = showIssues ? '' : 'none');
}

function parseDescription(desc) {
    if (!desc) return '// no description available';
    return desc.replace(/(https?:\\/\\/[^\\s]+)/g, url => \`<a href="\${url}" target="_blank" style="color:var(--green)">\${url}</a>\`);
}

function fetchRepoFiles(fullName, el) {
    const filesDiv = el.closest('.repo').querySelector('.files');
    if (filesDiv.style.display === 'block') { filesDiv.style.display = 'none'; return; }
    if (filesDiv.innerHTML) { filesDiv.style.display = 'block'; return; }

    filesDiv.innerHTML = '<div style="padding:8px;font-size:10px;letter-spacing:2px;color:rgba(0,255,0,0.4);">// loading...</div>';
    filesDiv.style.display = 'block';

    fetch(\`https://api.github.com/repos/\${fullName}/contents\`)
        .then(r => r.json())
        .then(files => {
            filesDiv.innerHTML = '';
            files.forEach(file => {
                const d = document.createElement('div');
                d.className = 'file';
                d.innerHTML = \`
                    <span>\${file.type === 'dir' ? '<i class="fas fa-folder" style="color:rgba(0,255,0,0.5);margin-right:6px;"></i>' : '<i class="fas fa-file-code" style="color:rgba(0,255,0,0.3);margin-right:6px;"></i>'}\${file.name}</span>
                    <div class="file-icons">
                        <a href="\${file.html_url}" target="_blank" title="View on GitHub"><i class="fab fa-github"></i></a>
                        \${file.download_url ? \`<a onclick="downloadFile('\${file.download_url}','\${file.name}')" title="Download"><i class="fas fa-download"></i></a>\` : ''}
                    </div>
                \`;
                filesDiv.appendChild(d);
            });
        })
        .catch(() => { filesDiv.innerHTML = '<div style="padding:8px;font-size:10px;color:rgba(255,80,80,0.6);">// error loading files</div>'; });
}

function fetchUserDetails(username, el) {
    const detailsDiv = el.closest('.repo').querySelector('.user-details');
    if (detailsDiv.style.display === 'block') { detailsDiv.style.display = 'none'; return; }
    if (detailsDiv.innerHTML) { detailsDiv.style.display = 'block'; return; }

    detailsDiv.innerHTML = '<div style="padding:8px;font-size:10px;letter-spacing:2px;color:rgba(0,255,0,0.4);">// fetching user data...</div>';
    detailsDiv.style.display = 'block';

    fetch(\`https://api.github.com/users/\${username}\`)
        .then(r => r.json())
        .then(user => {
            const joined = new Date(user.created_at).toLocaleDateString();
            let links = [];
            if (user.blog) links.push(\`<a href="\${user.blog.startsWith('http') ? user.blog : 'https://'+user.blog}" target="_blank">\${user.blog}</a>\`);
            if (user.twitter_username) links.push(\`<a href="https://twitter.com/\${user.twitter_username}" target="_blank">@\${user.twitter_username}</a>\`);
            if (user.email) links.push(\`<a href="mailto:\${user.email}">\${user.email}</a>\`);

            detailsDiv.innerHTML = \`
                <img src="\${user.avatar_url}" class="user-avatar" alt="\${user.login}">
                <div class="user-info">
                    <h4>\${user.name || user.login}</h4>
                    \${user.bio ? \`<p style="font-style:italic;opacity:0.7">"\${user.bio}"</p>\` : ''}
                    <p><span style="color:rgba(0,255,0,0.4)">location:</span> \${user.location || 'unknown'}</p>
                    <p><span style="color:rgba(0,255,0,0.4)">company:</span> \${user.company || 'unknown'}</p>
                    \${links.length ? \`<div class="user-links" style="margin-top:4px">\${links.join('<br>')}</div>\` : ''}
                </div>
                <div class="user-stats">
                    <span><i class="fas fa-book"></i> \${user.public_repos} repos</span>
                    <span><i class="fas fa-users"></i> \${user.followers} followers</span>
                    <span><i class="fas fa-user-plus"></i> \${user.following} following</span>
                    <span><i class="fas fa-calendar"></i> joined \${joined}</span>
                </div>
            \`;
        })
        .catch(() => { detailsDiv.innerHTML = '<div style="padding:8px;font-size:10px;color:rgba(255,80,80,0.6);">// error loading user</div>'; });
}

function downloadRepoZip(fullName) {
    fetch(\`https://api.github.com/repos/\${fullName}\`)
        .then(r => r.json())
        .then(repo => {
            const zipUrl = \`https://github.com/\${fullName}/archive/refs/heads/\${repo.default_branch}.zip\`;
            const proxy = \`https://api.codetabs.com/v1/tmp?quest=\${encodeURIComponent(zipUrl)}\`;
            fetch(proxy)
                .then(r => r.blob())
                .then(blob => triggerDownload(blob, \`\${fullName.replace('/','_')}.zip\`))
                .catch(() => alert('// download failed via proxy'));
        });
}

function triggerDownload(blob, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
}

function downloadFile(url, filename) {
    fetch(url).then(r => r.text()).then(data => {
        const blob = new Blob([data], { type: 'text/plain' });
        triggerDownload(blob, filename);
    }).catch(e => console.error(e));
}
<\/script>
</body>
</html>

    const bridge=`<script>(function(){
  function send(type,args){
    const text=args.map(a=>{if(typeof a==="object"){try{return JSON.stringify(a,null,2);}catch(e){return String(a);}}return String(a);}).join(" ");
    try{window.parent.postMessage({__rclog:true,type,text},"*");}catch(e){}
  }
  const _log=console.log,_warn=console.warn,_error=console.error,_info=console.info;
  console.log=(...a)=>{_log(...a);send("log",a);};
  console.warn=(...a)=>{_warn(...a);send("warn",a);};
  console.error=(...a)=>{_error(...a);send("error",a);};

  };
}());<\/script>`;

function showBase64(goBack){
  if(!goBack)goBack=showMenu;
  clearBody();
  const wrap=document.createElement("div");wrap.className="b64-wrap";
  const ta=document.createElement("textarea");ta.className="b64-ta";
  ta.placeholder="Paste text / HTML / Base64 here — or drag & drop any file to encode it...";
  function encodeFile(file){const r=new FileReader();r.onload=()=>{ta.value=r.result.split(",")[1];};r.readAsDataURL(file);}
  ta.addEventListener("dragover",e=>{e.preventDefault();ta.classList.add("drag-over");});
  ta.addEventListener("dragleave",()=>ta.classList.remove("drag-over"));
  ta.addEventListener("drop",e=>{e.preventDefault();ta.classList.remove("drag-over");const f=e.dataTransfer.files[0];if(f)encodeFile(f);});
  wrap.appendChild(ta);
  document.body.appendChild(wrap);
  const tb=document.createElement("div");tb.className="toolbar";
  const encBtn=makeBtn("Encode",()=>{try{ta.value=btoa(unescape(encodeURIComponent(ta.value)));}catch(e){alert("Encode failed: "+e.message);}});
  const decBtn=makeBtn("Decode",()=>{
    try{
      let val=ta.value.trim();
      const m=val.match(/^data:[^,]*?(;base64)?,(.*)$/s);
      if(m){val=m[1]===";base64"?m[2]:decodeURIComponent(m[2]);if(!m[1]){ta.value=val;return;}}
      ta.value=decodeURIComponent(escape(atob(val)));
    }catch(e){alert("Decode failed: "+e.message);}
  });
  const uriBtn=makeBtn("URI",()=>{try{ta.value="data:text/html;base64,"+btoa(unescape(encodeURIComponent(ta.value)));}catch(e){alert("URI encode failed: "+e.message);}});
  const copyBtn=makeBtn("Copy",()=>{navigator.clipboard.writeText(ta.value).then(()=>{copyBtn.textContent="Copied!";setTimeout(()=>copyBtn.textContent="Copy",1500);}).catch(()=>alert("Copy failed."));});
  const ulBtn=makeBtn("Upload",()=>{const input=document.createElement("input");input.type="file";input.onchange=e=>{const f=e.target.files[0];if(f)encodeFile(f);};input.click();});
  const dlBtn=makeBtn("Download",()=>{
    const content=ta.value;
    if(!content){alert("Nothing to download.");return;}
    const blob=new Blob([content],{type:"text/plain"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="base64_output.txt";a.click();
  });
  const b64btns=bindEscIfTerminal(goBack)?[encBtn,decBtn,uriBtn,copyBtn,ulBtn,dlBtn]:[makeBtn("Back",goBack),encBtn,decBtn,uriBtn,copyBtn,ulBtn,dlBtn];
  b64btns.forEach(b=>tb.appendChild(b));
  document.body.appendChild(tb);
  addCopyright();
}

function showTaskMgr(goBack){
  if(!goBack)goBack=showMenu;
  stopTest();clearBody();

  const cores=navigator.hardwareConcurrency||4;
  const INTERVAL=500;

  /* ── stat-box builder ── */
  function makeStatBox(parent,id,label,unit,sub){
    const box=document.createElement("div");box.className="stress-stat-box";
    const t=document.createElement("div");t.className="stress-stat-title";t.textContent=label;
    const vRow=document.createElement("div");vRow.style.cssText="display:flex;align-items:baseline;";
    const v=document.createElement("span");v.className="stress-stat-value";v.id=id;v.textContent="--";
    const u=document.createElement("span");u.className="stress-stat-unit";u.textContent=unit;
    vRow.appendChild(v);vRow.appendChild(u);
    const s=document.createElement("div");s.className="stress-stat-sub";s.textContent=sub;
    box.appendChild(t);box.appendChild(vRow);box.appendChild(s);
    parent.appendChild(box);
    return v;
  }

  /* ══════════════ PAGE SHELL ══════════════ */
  const page=document.createElement("div");page.className="stress-page";

  /* Header */
  const header=document.createElement("div");header.className="stress-header";
  const titleWrap=document.createElement("div");titleWrap.style.cssText="display:flex;align-items:center;gap:12px;";
  const dot=document.createElement("span");dot.className="stress-status-dot";dot.id="stressDot";
  const titleText=document.createElement("div");titleText.className="stress-title";titleText.textContent="TASK MANAGER";
  titleWrap.appendChild(dot);titleWrap.appendChild(titleText);
  const headerRight=document.createElement("div");headerRight.style.cssText="display:flex;align-items:center;gap:10px;";
  const badge=document.createElement("div");badge.className="stress-badge";badge.id="tmBadge";badge.textContent=cores+" LOGICAL CORES";
  headerRight.appendChild(badge);
  if(!bindEscIfTerminal(goBack)){
    const backBtn=document.createElement("button");backBtn.className="stress-btn";
    backBtn.style.cssText="flex:none;padding:4px 14px;font-size:12px;letter-spacing:1px;";
    backBtn.textContent="Back";
    backBtn.onclick=()=>{teardownActiveTab();stopTest();goBack();};
    headerRight.appendChild(backBtn);
  }
  header.appendChild(titleWrap);header.appendChild(headerRight);

  /* Tab bar */
  /* Tab content host */
  const tabContent=document.createElement("div");tabContent.style.cssText="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;";

  page.appendChild(header);page.appendChild(tabContent);
  document.body.appendChild(page);
  addCopyright();

  let activeTabName=null;
  let teardownActiveTab=(()=>{});

  function activateTab(name){
    if(activeTabName===name)return;
    teardownActiveTab();
    stopTest();
    dot.classList.remove("running");
    activeTabName=name;
    tabContent.innerHTML="";
    if(name==="CPU")teardownActiveTab=buildCPUTab();
    else teardownActiveTab=(()=>{});
  }

  /* ══════════════════════════════════
     CPU TAB — identical layout/logic to original stress test
  ══════════════════════════════════ */
  function buildCPUTab(){
    badge.textContent=cores+" LOGICAL CORES";
    const coreOps=new Array(cores).fill(0);
    const coreLoad=new Array(cores).fill(0);   // stress worker values
    const coreIdle=new Array(cores).fill(0);   // always-on idle probe

    const body=document.createElement("div");body.className="stress-body";
    const left=document.createElement("div");left.className="stress-left";

    const graphLabel=document.createElement("div");graphLabel.className="stress-section-label";graphLabel.textContent="OVERALL CPU LOAD";
    const graphWrap=document.createElement("div");graphWrap.className="stress-graph-wrap";
    const canvas=document.createElement("canvas");canvas.id="stressGraph";
    graphWrap.appendChild(canvas);

    const coresLabel=document.createElement("div");coresLabel.className="stress-section-label";coresLabel.textContent="PER-CORE LOAD";
    const coresDiv=document.createElement("div");coresDiv.className="stress-cores";
    const coreBars=[];
    for(let i=0;i<cores;i++){
      const row=document.createElement("div");row.className="stress-core-row";
      const lbl=document.createElement("div");lbl.className="stress-core-label";lbl.textContent="CORE "+i;
      const wrap=document.createElement("div");wrap.className="stress-core-bar-wrap";
      const bar=document.createElement("div");bar.className="stress-core-bar";
      wrap.appendChild(bar);
      const pct=document.createElement("div");pct.className="stress-core-pct";pct.textContent="0%";
      row.appendChild(lbl);row.appendChild(wrap);row.appendChild(pct);
      coresDiv.appendChild(row);coreBars.push({bar,pct});
    }
    left.appendChild(graphLabel);left.appendChild(graphWrap);
    left.appendChild(coresLabel);left.appendChild(coresDiv);

    const right=document.createElement("div");right.className="stress-right";
    makeStatBox(right,"stressLoad","AVG LOAD","%","across all cores");
    makeStatBox(right,"stressTemp","EST. TEMPERATURE","°C","thermal estimate");
    makeStatBox(right,"stressMem","HEAP USED","MB","js memory snapshot");

    body.appendChild(left);body.appendChild(right);

    const controls=document.createElement("div");controls.className="stress-controls";
    const startBtn=document.createElement("button");startBtn.className="stress-btn";startBtn.textContent="▶  START STRESS";
    const stopBtn=document.createElement("button");stopBtn.className="stress-btn stop";stopBtn.textContent="■  STOP";
    controls.appendChild(startBtn);controls.appendChild(stopBtn);

    tabContent.appendChild(body);tabContent.appendChild(controls);

    const graphHistory=new Array(80).fill(0);
    let graphRaf=null;
    function resizeGraph(){canvas.width=graphWrap.clientWidth||300;canvas.height=graphWrap.clientHeight||120;}
    setTimeout(resizeGraph,0);
    window.addEventListener("resize",resizeGraph);

    // ── Always-on idle probe worker ──
    let idleWorker=null,idleBaseline=null;
    const idleWorkerCode=`
      const CORES=${cores};const SLOT=16;
      function probe(){const t0=performance.now();let ops=0;while(performance.now()-t0<SLOT){for(let i=0;i<2000;i++)ops+=Math.sqrt(i);}return ops;}
      const base=[];for(let i=0;i<CORES;i++)base.push(probe());
      postMessage({type:'baseline',results:base});
      function tick(){const r=[];for(let i=0;i<CORES;i++)r.push(probe());postMessage({type:'probe',results:r});setTimeout(tick,${INTERVAL});}
      setTimeout(tick,${INTERVAL});
    `;
    idleWorker=new Worker(URL.createObjectURL(new Blob([idleWorkerCode],{type:'application/javascript'})));
    idleWorker.onmessage=(e)=>{
      const {type,results}=e.data;
      if(type==='baseline'){idleBaseline=results.map(v=>Math.max(v,1));return;}
      if(!idleBaseline||stressRunning)return;
      results.forEach((ops,i)=>{coreIdle[i]=Math.round((1-Math.min(ops/idleBaseline[i],1))*100);});
    };

    function rafLoop(){
      graphRaf=requestAnimationFrame(rafLoop);
      const w=canvas.width,h=canvas.height;if(!w||!h)return;
      const ctx=canvas.getContext("2d");
      ctx.clearRect(0,0,w,h);
      ctx.strokeStyle="rgba(0,255,0,0.07)";ctx.lineWidth=1;
      for(let i=0;i<=4;i++){const y=Math.floor(h*i/4)+0.5;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
      ctx.fillStyle="rgba(0,255,0,0.2)";ctx.font="9px monospace";ctx.textAlign="right";
      ["100%","75%","50%","25%","0%"].forEach((l,i)=>ctx.fillText(l,w-3,h*i/4+10));
      ctx.beginPath();ctx.strokeStyle="#0f0";ctx.lineWidth=1.5;ctx.shadowColor="#0f0";ctx.shadowBlur=3;
      const step=w/graphHistory.length;
      graphHistory.forEach((v,i)=>{const x=i*step,y=h-(v/100)*(h-2)+1;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
      ctx.stroke();ctx.shadowBlur=0;ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fillStyle="rgba(0,255,0,0.05)";ctx.fill();
    }
    rafLoop();

    let statsIv=null,startTime=null;

    // Stats tick — always running, switches data source based on stress state
    statsIv=setInterval(()=>{
      const activeLoad=stressRunning?coreLoad:coreIdle;
      const avgLoad=Math.round(activeLoad.reduce((a,b)=>a+b,0)/cores);
      graphHistory.push(avgLoad);graphHistory.shift();
      const loadEl=document.getElementById("stressLoad");
      if(loadEl){loadEl.textContent=avgLoad;loadEl.style.color=avgLoad>85?"#f55":avgLoad>65?"#fa0":"#0f0";}
      const tempEl=document.getElementById("stressTemp");
      if(tempEl){
        const elapsed=stressRunning?Math.floor((Date.now()-startTime)/1000):0;
        const t=Math.min(99,Math.round(35+(avgLoad/100)*55*(stressRunning?(1-Math.exp(-elapsed/30)):0.1)));
        tempEl.textContent=t;tempEl.style.color=t>85?"#f55":t>70?"#fa0":"#0f0";
      }
      const memEl=document.getElementById("stressMem");
      if(memEl&&performance.memory)memEl.textContent=(performance.memory.usedJSHeapSize/1048576).toFixed(1);
      else if(memEl)memEl.textContent="N/A";
      coreBars.forEach(({bar,pct},i)=>{
        const v=activeLoad[i]||0;
        bar.style.width=v+"%";
        bar.style.background=v>85?"linear-gradient(90deg,#a00,#f55)":v>65?"linear-gradient(90deg,#550,#fa0)":"linear-gradient(90deg,#0a0,#0f0)";
        pct.textContent=v+"%";pct.style.color=v>85?"#f55":v>65?"#fa0":"#0f0";
      });
    },INTERVAL);

    function doStart(){
      if(stressRunning)return;
      stressRunning=true;coreOps.fill(0);coreLoad.fill(0);
      const workerCode=`
        const INTERVAL=${INTERVAL};
        function tick(){
          const start=performance.now();const busyUntil=start+INTERVAL;let ops=0;
          while(performance.now()<busyUntil){for(let i=0;i<5000;i++)ops+=Math.sqrt(i)*Math.sin(i);}
          const elapsed=performance.now()-start;
          postMessage({ops,load:Math.min(100,Math.round((elapsed/INTERVAL)*100))});
          setTimeout(tick,0);
        }tick();
      `;
      for(let i=0;i<cores;i++){
        const w=new Worker(URL.createObjectURL(new Blob([workerCode],{type:'application/javascript'})));
        const idx=i;
        w.onmessage=(e)=>{coreOps[idx]+=e.data.ops;coreLoad[idx]=e.data.load;totalOps+=e.data.ops;};
        stressWorkers.push(w);
      }
    }

    startBtn.onclick=()=>{
      if(stressRunning)return;
      doStart();startTime=Date.now();
      dot.classList.add("running");startBtn.classList.add("active");
    };
    stopBtn.onclick=()=>{
      stopTest();dot.classList.remove("running");startBtn.classList.remove("active");
      coreLoad.fill(0);graphHistory.fill(0);
    };

    return function teardown(){
      cancelAnimationFrame(graphRaf);clearInterval(statsIv);
      if(idleWorker){idleWorker.terminate();idleWorker=null;}
      window.removeEventListener("resize",resizeGraph);
      stopTest();dot.classList.remove("running");startBtn.classList.remove("active");
    };
  }

  activateTab("CPU");
}
